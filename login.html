<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/png" href="logo.png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Ripple Website</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="index.css">
    <style>
        body {
            margin: 0;
            font-family: 'Inter', sans-serif;
            background: #F3F6FA;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        .auth-container {
            width: 100%;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .auth-modal-content {
            background: white;
            border-radius: 16px;
            padding: 48px;
            width: 90%;
            max-width: 400px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
        }
        .auth-form {
            display: none;
        }

        .auth-form.active {
            display: block;
        }

        .auth-form h2 {
            font-size: 28px;
            font-weight: 700;
            color: #1F2328;
            margin-bottom: 24px;
            text-align: center;
        }
        .auth-form form {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        .auth-form input {
            padding: 12px 16px;
            border: 1px solid #DFE3E8;
            border-radius: 8px;
            font-size: 14px;
            font-family: 'Inter', sans-serif;
            outline: none;
            transition: border-color 0.3s ease;
        }
        .auth-form input:focus {
            border-color: #5C7CFF;
        }
        .auth-submit-btn {
            padding: 12px 16px;
            background: #5C7CFF;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.3s ease;
            margin-top: 8px;
        }
        .auth-submit-btn:hover {
            background: #4563d9;
        }
        .auth-secondary-btn {
            padding: 10px 16px;
            background: #eef2ff;
            color: #2e63e5;
            border: 1px solid #c7d2fe;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.3s ease, border-color 0.3s ease;
        }

        .auth-secondary-btn:hover {
            background: #e0e7ff;
            border-color: #a5b4fc;
        }
        .auth-switch-text {
            text-align: center;
            margin-top: 16px;
            font-size: 14px;
            color: #6B7178;
        }
        .auth-switch-text a {
            color: #5C7CFF;
            text-decoration: none;
            font-weight: 600;
            cursor: pointer;
        }
        .auth-switch-text a:hover {
            text-decoration: underline;
        }
        .error-message {
            color: #d32f2f;
            font-size: 14px;
            text-align: center;
            margin-top: 12px;
            display: none;
        }

        .error-message.show {
            display: block;
        }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="auth-modal-content">
            <div id="signInForm" class="auth-form active">
                <h2>Sign In</h2>
                <form id="signInFormElement">
                    <input type="email" id="signInEmail" placeholder="Email address" autocomplete="email" required />
                    <input type="password" id="signInPassword" placeholder="Password" required />
                    <button type="submit" class="auth-submit-btn">Sign In</button>
                </form>
                <p class="auth-switch-text">Don't have an account? <a href="#" id="switchToSignUp">Sign Up</a></p>
                <div class="error-message" id="signInError"></div>
            </div>
            <div id="signUpForm" class="auth-form">
                <h2>Create Account</h2>
                <form id="signUpFormElement">
                    <input type="text" id="signUpName" placeholder="Full name" autocomplete="name" required />
                    <input type="email" id="signUpEmail" placeholder="Email address" autocomplete="email" required />
                    <input type="password" id="signUpPassword" placeholder="Password" required />
                    <input type="password" id="confirmPassword" placeholder="Confirm Password" required />
                    <button type="submit" class="auth-submit-btn">Create Account</button>
                </form>
                <p class="auth-switch-text">Already have an account? <a href="#" id="switchToSignIn">Sign In</a></p>
                <div class="error-message" id="signUpError"></div>
            </div>
        </div>
    </div>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, updateProfile } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-auth.js";
        import { getFirestore, setDoc, doc, addDoc, collection, serverTimestamp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";
        const firebaseConfig = {
            apiKey: "AIzaSyBguT9BsQHwsAwAd3mbEmj3S5E7GtR_IBU",
            authDomain: "webmaster-v4-0.firebaseapp.com",
            projectId: "webmaster-v4-0",
            storageBucket: "webmaster-v4-0.firebasestorage.app",
            messagingSenderId: "413556961992",
            appId: "1:413556961992:web:899600895ecb68eb9debfd"
        };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const normalizeEmail = (value) => value.trim().toLowerCase();
        const isValidEmail = (value) => /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(value);
        const emailToUsername = (email) => normalizeEmail(email).split('@')[0].replace(/[^a-z0-9._-]/g, '').slice(0, 30) || 'member';
        function authMessage(error, fallback) {
            if (!error || !error.code) return fallback;
            switch (error.code) {
                case 'auth/invalid-email':
                    return 'Enter a valid email address.';
                case 'auth/user-not-found':
                case 'auth/wrong-password':
                case 'auth/invalid-login-credentials':
                    return 'Invalid email or password.';
                case 'auth/email-already-in-use':
                    return 'That email is already connected to an account.';
                case 'auth/weak-password':
                    return 'Password should be at least 6 characters.';
                case 'auth/network-request-failed':
                    return 'Network error. Please try again.';
                default:
                    return fallback;
            }
        }
        onAuthStateChanged(auth, (user) => {
            if (user) {
                window.location.href = 'main.html';
            }
        });
        const signInForm = document.getElementById('signInForm');
        const signUpForm = document.getElementById('signUpForm');
        const switchToSignUp = document.getElementById('switchToSignUp');
        const switchToSignIn = document.getElementById('switchToSignIn');
        const signInFormElement = document.getElementById('signInFormElement');
        const signUpFormElement = document.getElementById('signUpFormElement');
        const signInError = document.getElementById('signInError');
        const signUpError = document.getElementById('signUpError');
        switchToSignUp.addEventListener('click', function(e) {
            e.preventDefault();
            signInForm.classList.remove('active');
            signUpForm.classList.add('active');
            signInError.classList.remove('show');
        });
        switchToSignIn.addEventListener('click', function(e) {
            e.preventDefault();
            signUpForm.classList.remove('active');
            signInForm.classList.add('active');
            signUpError.classList.remove('show');
        });
        signInFormElement.addEventListener('submit', function(e) {
            e.preventDefault();
            const email = normalizeEmail(document.getElementById('signInEmail').value);
            const password = document.getElementById('signInPassword').value;
            if (!isValidEmail(email)) {
                signInError.textContent = 'Enter a valid email address.';
                signInError.classList.add('show');
                return;
            }
            signInWithEmailAndPassword(auth, email, password)
                .then((userCredential) => {
                    const user = userCredential.user;
                    addDoc(collection(db, 'notifications'), {
                        type: 'auth',
                        itemType: 'login',
                        itemId: user.uid,
                        title: 'User Login',
                        message: `${email} signed in.`,
                        recipientsRole: ['admin'],
                        status: 'unread',
                        createdBy: user.uid,
                        createdByEmail: email,
                        createdAt: serverTimestamp()
                    }).catch(() => {});
                    window.location.href = 'main.html';
                })
                .catch((error) => {
                    signInError.textContent = authMessage(error, 'Invalid email or password.');
                    signInError.classList.add('show');
                });
        });
        signUpFormElement.addEventListener('submit', function(e) {
            e.preventDefault();
            const name = document.getElementById('signUpName').value.trim();
            const email = normalizeEmail(document.getElementById('signUpEmail').value);
            const password = document.getElementById('signUpPassword').value;
            const confirmPassword = document.getElementById('confirmPassword').value;

            if (!name) {
                signUpError.textContent = 'Enter your name.';
                signUpError.classList.add('show');
                return;
            }
            if (!isValidEmail(email)) {
                signUpError.textContent = 'Enter a valid email address.';
                signUpError.classList.add('show');
                return;
            }
            if (password !== confirmPassword) {
                signUpError.textContent = 'Passwords do not match!';
                signUpError.classList.add('show');
                return;
            }
            createUserWithEmailAndPassword(auth, email, password)
                .then(async (userCredential) => {
                    const user = userCredential.user;
                    await updateProfile(user, { displayName: name }).catch(() => {});
                    await setDoc(doc(db, "users", user.uid), {
                        username: emailToUsername(email),
                        name,
                        email,
                        role: 'member',
                        createdAt: serverTimestamp()
                    });
                    addDoc(collection(db, 'notifications'), {
                        type: 'auth',
                        itemType: 'signup',
                        itemId: user.uid,
                        title: 'New Signup',
                        message: `${name} created a new account with ${email}.`,
                        recipientsRole: ['admin'],
                        status: 'unread',
                        createdBy: user.uid,
                        createdByEmail: email,
                        createdAt: serverTimestamp()
                    }).catch(() => {});

                    localStorage.setItem('rippleUserName', name);
                    window.location.href = 'main.html';
                })
                .catch((error) => {
                    signUpError.textContent = authMessage(error, 'An error occurred during sign up.');
                    signUpError.classList.add('show');
                });
        });
    </script>
  <script type="module" src="ripple-admin-nav.js"></script>
</body>
</html>
